<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congress Search</title>
    <meta name="description" content="A simple search engine for members of congress.">
    <meta name="author" content="Michael Wong">
    <link rel="stylesheet" href="./css/style.css">

<body>
    <header>
        <form action="" class="header__search-bar">
            <button class="header__filter-btn">
                <div class="header__filter-btn-lines"></div>
            </button>
            <input type="text" class="header__text-field" placeholder="State">

        </form>
    </header>
    <main>
        <ul class="card__list">
            <li class="card__container">

                    <div class="card__details">
                        <h2 class="card__title">Susan Collins</h2>
                        <p>Senator</p>
                        <p>Maine</p>
                        <a href="#">View Profile</a>
                    </div>
                </article>
                <article class="card">
                    <img src="https://memberguide.gpo.gov/pictorialimages/119_RP_MA_5_Clark_Katherine.jpg" alt="Portrait of Katherine Clark" class="card__portrait">
                    <div class="card__details">
                        <h2 class="card__title">Katherine Clark</h2>
                        <p>Representative</p>
                        <p>Massachusetts - 5th District</p>
                        <a href="#">View Profile</a>
                    </div>
                </article>
                <article class="card">
                    <img src="https://memberguide.gpo.gov/pictorialimages/119_RP_MN_5_Omar_Ilhan.jpg" alt="Portrait of Ilhan Omar" class="card__portrait">
                    <div class="card__details">
                        <h2 class="card__title">Ilhan Omar</h2>
                        <p>Representative</p>
                        <p>Minnesota - 5th District</p>
                        <a href="#">View Profile</a>
                    </div>
                </article>
            </li>
